<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oda Class — Admin Panel</title>
  <!-- Google Fonts Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #0F172A;
      --card-bg: rgba(30, 41, 59, 0.75);
      --card-border: rgba(255, 255, 255, 0.1);
      --teal: #00B6A6;
      --teal-hover: #009385;
      --orange: #FF5E00;
      --text-main: #F8FAFC;
      --text-muted: #94A3B8;
      --success: #10B981;
      --error: #EF4444;
      --border-radius-lg: 16px;
      --border-radius-md: 10px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-image: radial-gradient(circle at 10% 20%, rgba(0, 182, 166, 0.08) 0%, transparent 45%),
                        radial-gradient(circle at 90% 80%, rgba(255, 94, 0, 0.06) 0%, transparent 40%);
      background-attachment: fixed;
    }

    header {
      backdrop-filter: blur(12px);
      background-color: rgba(15, 23, 42, 0.95);
      border-bottom: 1px solid var(--card-border);
      padding: 16px 5%;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-badge {
      background-color: var(--teal);
      color: white;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .main-container {
      max-width: 1000px;
      width: 90%;
      margin: 30px auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--border-radius-lg);
      padding: 24px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .class-selector-card {
      padding: 24px;
      border-left: 5px solid var(--teal);
    }

    .section-title {
      display: block;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--teal);
      margin-bottom: 12px;
    }

    .class-select-container {
      position: relative;
      display: inline-block;
      width: 100%;
      max-width: 320px;
    }

    .class-select-dropdown {
      width: 100%;
      background: #1E293B;
      border: 2px solid var(--teal);
      border-radius: var(--border-radius-md);
      padding: 12px 18px;
      color: #FFFFFF;
      font-size: 15px;
      font-weight: 600;
      outline: none;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      transition: all 0.25s ease;
    }

    .class-select-dropdown:hover {
      border-color: #00D2C0;
    }

    /* Custom select chevron arrow */
    .class-select-container::after {
      content: '▼';
      font-size: 10px;
      color: var(--teal);
      right: 18px;
      top: 18px;
      position: absolute;
      pointer-events: none;
    }

    .editor-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 25px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: var(--border-radius-md);
      padding: 12px 16px;
      color: var(--text-main);
      font-size: 14.5px;
      outline: none;
      transition: all 0.2s ease;
    }

    .form-group input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 10px rgba(0, 182, 166, 0.15);
      background: rgba(15, 23, 42, 0.8);
    }

    .media-upload-row {
      display: flex;
      align-items: center;
      gap: 15px;
      background: rgba(15, 23, 42, 0.4);
      padding: 12px;
      border-radius: var(--border-radius-md);
      border: 1px dashed rgba(255, 255, 255, 0.1);
      margin-top: 6px;
    }

    .media-preview-container {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .media-preview-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .media-preview-container .placeholder {
      font-size: 18px;
      color: var(--text-muted);
    }

    .file-input-wrapper {
      position: relative;
      flex: 1;
    }

    .file-input-wrapper input[type="file"] {
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    .file-input-btn {
      display: inline-block;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      width: 100%;
    }

    .file-input-wrapper:hover .file-input-btn {
      background: rgba(255, 255, 255, 0.1);
    }

    .sub-card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--text-main);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .grid-fields-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
    }

    .grid-fields-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 768px) {
      .grid-fields-3, .grid-fields-2 {
        grid-template-columns: 1fr;
      }
    }

    .teacher-grid-edit {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 768px) {
      .teacher-grid-edit {
        grid-template-columns: 1fr;
      }
    }

    .teacher-item-group {
      border: 1px solid rgba(255, 255, 255, 0.04);
      background: rgba(255, 255, 255, 0.015);
      padding: 18px;
      border-radius: var(--border-radius-lg);
    }

    .teacher-title-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      background: rgba(255, 94, 0, 0.1);
      color: var(--orange);
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 12px;
    }

    .save-btn {
      width: 100%;
      background: var(--teal);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 15px rgba(0, 182, 166, 0.25);
      transition: all 0.25s ease;
      margin-top: 15px;
    }

    .save-btn:hover {
      background: var(--teal-hover);
      box-shadow: 0 6px 20px rgba(0, 182, 166, 0.4);
    }

    .loader-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(5px);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 15px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .loader-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .spinner {
      width: 45px;
      height: 45px;
      border: 3.5px solid rgba(0, 182, 166, 0.2);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 1s infinite linear;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #1e293b;
      border-left: 4px solid var(--success);
      padding: 15px 25px;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      gap: 10px;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 1001;
    }

    .toast.active {
      transform: translateY(0);
      opacity: 1;
    }

    .toast-icon {
      color: var(--success);
      font-weight: bold;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-container">
      <span class="logo-badge">ODA</span>
      <h1>Class Administration Workspace</h1>
    </div>
    <div style="font-size: 13px; color: var(--text-muted); font-weight: 500;">
      MongoDB Atlas Connected
    </div>
  </header>

  <div class="main-container">
    
    <!-- Class Selector Dropdown Container -->
    <div class="card class-selector-card">
      <label class="section-title" for="classSelect">Choose Student Grade to Configure</label>
      <div class="class-select-container">
        <select id="classSelect" onchange="selectClass(this.value)" class="class-select-dropdown">
          <option value="Class 1">Class 1</option>
          <option value="Class 2">Class 2</option>
          <option value="Class 3">Class 3</option>
          <option value="Class 4">Class 4</option>
          <option value="Class 5">Class 5</option>
          <option value="Class 6" selected>Class 6</option>
          <option value="Class 7">Class 7</option>
          <option value="Class 8">Class 8</option>
          <option value="Class 9">Class 9</option>
          <option value="Class 10">Class 10</option>
          <option value="Class 11">Class 11</option>
        </select>
      </div>
    </div>

    <!-- Layout Forms -->
    <div class="editor-layout">
      
      <!-- Top banner & Upcoming class -->
      <div class="card">
        <h3 class="sub-card-title">1. Dashboard Value Banner & Live Upcoming Class</h3>
        
        <div class="grid-fields-2">
          <div class="form-group">
            <label for="bannerText">Marketing Subtitle Banner Text</label>
            <input type="text" id="bannerText" placeholder="e.g. Best with 20 Million Users' Trust">
          </div>

          <div class="form-group">
            <label for="upcomingTitle">Class Lecture Title</label>
            <input type="text" id="upcomingTitle" placeholder="e.g. Linear Equations & Algebraic Identities">
          </div>
        </div>

        <div class="grid-fields-3">
          <div class="form-group">
            <label for="upcomingSubject">Subject</label>
            <input type="text" id="upcomingSubject" placeholder="e.g. Mathematics">
          </div>

          <div class="form-group">
            <label for="upcomingTime">Schedule / Time Label</label>
            <input type="text" id="upcomingTime" placeholder="e.g. Today, 6:00 PM">
          </div>

          <div class="form-group">
            <label for="upcomingTeacherName">Teacher Name</label>
            <input type="text" id="upcomingTeacherName" placeholder="e.g. Sonia Verma">
          </div>
        </div>

        <!-- Teacher Avatar File Upload -->
        <div class="form-group">
          <label>Upcoming Class Teacher Photo</label>
          <div class="media-upload-row">
            <div class="media-preview-container">
              <img id="upcomingTeacherAvatarPreview" src="" alt="" style="display: none;">
              <span id="upcomingTeacherAvatarPlaceholder" class="placeholder">👤</span>
            </div>
            <div class="file-input-wrapper">
              <span class="file-input-btn">Upload Photo File</span>
              <input type="file" id="upcomingTeacherAvatarFile" onchange="uploadImageFile(this, 'upcomingTeacherAvatar', 'upcomingTeacherAvatarPreview', 'upcomingTeacherAvatarPlaceholder')">
            </div>
            <input type="hidden" id="upcomingTeacherAvatar" value="">
          </div>
        </div>
      </div>

      <!-- Booster Course Form -->
      <div class="card">
        <h3 class="sub-card-title">2. Concept Booster Course Card Content</h3>
        
        <div class="grid-fields-3">
          <div class="form-group">
            <label for="boosterHeaderTitle">Booster Section Header Title</label>
            <input type="text" id="boosterHeaderTitle" placeholder="e.g. 6-Day Head Start Course">
          </div>

          <div class="form-group">
            <label for="boosterHeaderSubtitle">Booster Section Header Subtitle</label>
            <input type="text" id="boosterHeaderSubtitle" placeholder="e.g. IIT/NIT Premium BootCamp">
          </div>

          <div class="form-group">
            <label for="boosterCardTitle">Booster Inner Card Cover Title</label>
            <input type="text" id="boosterCardTitle" placeholder="e.g. Maximize Your Child's Potential 100%">
          </div>
        </div>

        <div class="form-group">
          <label for="boosterTitle">Booster Course Lecture Description</label>
          <input type="text" id="boosterTitle" placeholder="e.g. Concept Booster Course - 5X Efficient Learning Methods by IITians">
        </div>

        <div class="grid-fields-2">
          <div class="form-group">
            <label for="boosterPrice">Booster Enrollment Price (INR)</label>
            <input type="number" id="boosterPrice" placeholder="149">
          </div>

          <div class="form-group">
            <label for="boosterOriginalPrice">Booster Original Strike Price (INR)</label>
            <input type="number" id="boosterOriginalPrice" placeholder="999">
          </div>
        </div>
      </div>

      <!-- Master Program Form -->
      <div class="card">
        <h3 class="sub-card-title">3. Master Program Card Content</h3>
        
        <div class="grid-fields-3">
          <div class="form-group">
            <label for="masterHeaderTitle">Master Program Section Header Title</label>
            <input type="text" id="masterHeaderTitle" placeholder="e.g. Master Program">
          </div>

          <div class="form-group">
            <label for="masterHeaderSubtitle">Master Program Section Header Subtitle</label>
            <input type="text" id="masterHeaderSubtitle" placeholder="Long-term Comprehensive Intensive 🎯">
          </div>

          <div class="form-group">
            <label for="masterPrice">Master Program Price (INR)</label>
            <input type="number" id="masterPrice" placeholder="31999">
          </div>
        </div>

        <div class="form-group">
          <label for="masterTitle">Master Program Title Description</label>
          <input type="text" id="masterTitle" placeholder="e.g. LIVE Interactive Full Syllabus Course for Class 6 (2026-27)">
        </div>

        <div class="grid-fields-3">
          <div class="form-group">
            <label for="masterBullet1">Curriculum Bullet 1</label>
            <input type="text" id="masterBullet1" placeholder="e.g. Full Academic Year Preparation">
          </div>

          <div class="form-group">
            <label for="masterBullet2">Curriculum Bullet 2</label>
            <input type="text" id="masterBullet2" placeholder="e.g. Complete CBSE/ICSE Board Syllabus covered">
          </div>

          <div class="form-group">
            <label for="masterBullet3">Curriculum Bullet 3</label>
            <input type="text" id="masterBullet3" placeholder="e.g. All Core Subjects covered">
          </div>
        </div>
      </div>

      <!-- Teachers Roster list -->
      <div class="card">
        <h3 class="sub-card-title">4. Main Roster Teachers</h3>
        
        <div class="teacher-grid-edit" id="teachersContainer">
          <!-- 3 teachers cards loaded here -->
        </div>

        <button class="save-btn" onclick="saveConfiguration()">
          <svg style="width:18px; height:18px; fill:currentColor" viewBox="0 0 24 24"><path d="M15 9H5V5H15M12 19A3 3 0 0 1 9 16A3 3 0 0 1 12 13A3 3 0 0 1 15 16A3 3 0 0 1 12 19M17 3H5C3.89 3 3 3.9 3 5V19A2 2 0 0 0 5 21H19A2 2 0 0 0 21 19V7L17 3Z"/></svg>
          Save Homepage Configurations
        </button>
      </div>

    </div>

  </div>

  <!-- Loading overlay -->
  <div class="loader-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div style="font-weight: 500; font-size: 14px;">Syncing with MongoDB Atlas...</div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast">
    <span class="toast-icon">✓</span>
    <span id="toastMessage">Configurations successfully saved!</span>
  </div>

  <script>
    let currentClass = 'Class 6';
    let currentConfigData = null;

    // Standard default configurations
    const DEFAULT_CONFIGS = {
      bannerText: "Best with 20 Million Users' Trust",
      upcomingClass: {
        title: "Fun with Numbers & Shapes - Lesson 1",
        subject: "Mathematics",
        time: "Today, 6:00 PM",
        teacherName: "Sonia Verma",
        teacherAvatar: ""
      },
      boosterCourse: {
        headerTitle: "6-Day Head Start Course",
        headerSubtitle: "IIT/NIT Premium BootCamp",
        cardTitle: "Maximize Your Child's Potential 100%",
        title: "Concept Booster Course - 5X Efficient Learning Methods by IITians",
        price: 149,
        originalPrice: 999
      },
      masterProgram: {
        headerTitle: "Master Program",
        headerSubtitle: "Long-term Comprehensive Intensive 🎯",
        title: "LIVE Interactive Full Syllabus Course (2026-27)",
        bullets: [
          "Full Academic Year Preparation",
          "Complete CBSE/ICSE Board Syllabus covered",
          "All Core Subjects covered"
        ],
        price: 31999
      },
      teachers: [
        { name: "Sonia Verma", role: "Maths Expert", avatar: "" },
        { name: "Pankaj Goyal", role: "Science Expert", avatar: "" },
        { name: "Anshu Patel", role: "English Expert", avatar: "" }
      ]
    };

    // Initialize Page
    document.addEventListener('DOMContentLoaded', () => {
      loadConfig(currentClass);
    });

    function selectClass(classId) {
      currentClass = classId;
      document.getElementById('classSelect').value = classId; // explicitly sync dropdown
      loadConfig(classId);
    }

    // Load configs from API
    async function loadConfig(classId) {
      showLoader(true);
      try {
        const response = await fetch(`/api/homepage-configs/${classId}`);
        const result = await response.json();
        
        if (result.success && result.data) {
          currentConfigData = result.data;
          populateForm(result.data);
        } else {
          // pre-populate input fields with class-specific defaults
          const fallback = JSON.parse(JSON.stringify(DEFAULT_CONFIGS));
          fallback.classId = classId;
          fallback.masterProgram.title = `LIVE Interactive Full Syllabus Course for ${classId} (2026-27)`;
          if (classId === 'Class 8' || classId === 'Class 9' || classId === 'Class 10' || classId === 'Class 11') {
            fallback.bannerText = "Most Pioneer LIVE Learning Platform";
          }
          currentConfigData = fallback;
          populateForm(fallback);
        }
      } catch (err) {
        console.error('Error fetching config:', err);
        const fallback = JSON.parse(JSON.stringify(DEFAULT_CONFIGS));
        fallback.classId = classId;
        currentConfigData = fallback;
        populateForm(fallback);
        showToast("Loaded offline default values");
      } finally {
        showLoader(false);
      }
    }

    function populateForm(data) {
      if (!data) return;

      document.getElementById('bannerText').value = data.bannerText || '';
      
      const uc = data.upcomingClass || {};
      document.getElementById('upcomingTitle').value = uc.title || '';
      document.getElementById('upcomingSubject').value = uc.subject || '';
      document.getElementById('upcomingTime').value = uc.time || '';
      document.getElementById('upcomingTeacherName').value = uc.teacherName || '';
      
      // Set upcoming avatar preview
      const upcomingAvatar = uc.teacherAvatar || '';
      document.getElementById('upcomingTeacherAvatar').value = upcomingAvatar;
      setPreviewImage('upcomingTeacherAvatarPreview', 'upcomingTeacherAvatarPlaceholder', upcomingAvatar);

      // Populate Booster card fields
      const bc = data.boosterCourse || {};
      document.getElementById('boosterHeaderTitle').value = bc.headerTitle || '';
      document.getElementById('boosterHeaderSubtitle').value = bc.headerSubtitle || '';
      document.getElementById('boosterCardTitle').value = bc.cardTitle || '';
      document.getElementById('boosterTitle').value = bc.title || '';
      document.getElementById('boosterPrice').value = bc.price || 149;
      document.getElementById('boosterOriginalPrice').value = bc.originalPrice || 999;

      // Populate Master card fields
      const mc = data.masterProgram || {};
      document.getElementById('masterHeaderTitle').value = mc.headerTitle || '';
      document.getElementById('masterHeaderSubtitle').value = mc.headerSubtitle || '';
      document.getElementById('masterTitle').value = mc.title || '';
      document.getElementById('masterPrice').value = mc.price || 31999;

      const bullets = mc.bullets || [];
      document.getElementById('masterBullet1').value = bullets[0] || '';
      document.getElementById('masterBullet2').value = bullets[1] || '';
      document.getElementById('masterBullet3').value = bullets[2] || '';

      // Render teachers list
      const container = document.getElementById('teachersContainer');
      container.innerHTML = '';

      const teachers = data.teachers || [];
      // Ensure we always edit 3 teachers
      while (teachers.length < 3) {
        teachers.push({ name: '', role: '', avatar: '' });
      }

      teachers.forEach((t, index) => {
        const group = document.createElement('div');
        group.className = 'teacher-item-group';
        group.innerHTML = `
          <div class="teacher-title-badge">Teacher #${index + 1}</div>
          <div class="form-group">
            <label>Name</label>
            <input type="text" class="t-name" value="${t.name || ''}" placeholder="e.g. Sonia Verma">
          </div>
          <div class="form-group">
            <label>Role / Specialty</label>
            <input type="text" class="t-role" value="${t.role || ''}" placeholder="e.g. Maths Master (IITian)">
          </div>
          <div class="form-group">
            <label>Photo Avatar</label>
            <div class="media-upload-row">
              <div class="media-preview-container">
                <img id="t-preview-${index}" src="" alt="" style="display: none;">
                <span id="t-placeholder-${index}" class="placeholder">👤</span>
              </div>
              <div class="file-input-wrapper">
                <span class="file-input-btn">Upload</span>
                <input type="file" onchange="uploadImageFile(this, 't-url-${index}', 't-preview-${index}', 't-placeholder-${index}')">
              </div>
              <input type="hidden" class="t-avatar" id="t-url-${index}" value="${t.avatar || ''}">
            </div>
          </div>
        `;
        container.appendChild(group);
        setPreviewImage(`t-preview-${index}`, `t-placeholder-${index}`, t.avatar);
      });
    }

    function setPreviewImage(imgId, placeholderId, url) {
      const img = document.getElementById(imgId);
      const placeholder = document.getElementById(placeholderId);
      if (!img || !placeholder) return;
      if (url) {
        img.src = url;
        img.style.display = 'block';
        placeholder.style.display = 'none';
      } else {
        img.src = '';
        img.style.display = 'none';
        placeholder.style.display = 'block';
      }
    }

    // Handles reading local files, base64 encoding and calling the backend upload API
    async function uploadImageFile(fileInput, hiddenInputId, imgPreviewId, placeholderId) {
      const file = fileInput.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async (e) => {
        const base64Data = e.target.result.split(',')[1];
        
        showLoader(true);
        try {
          const response = await fetch('/api/homepage-configs/upload', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ base64: base64Data })
          });
          const result = await response.json();
          if (result.success && result.url) {
            document.getElementById(hiddenInputId).value = result.url;
            setPreviewImage(imgPreviewId, placeholderId, result.url);
            showToast('Photo uploaded successfully! 📸');
          } else {
            alert('Upload failed: ' + (result.error || 'Unknown error'));
          }
        } catch (err) {
          console.error('Upload connection error:', err);
          alert('Failed to connect to image upload service.');
        } finally {
          showLoader(false);
        }
      };
      reader.readAsDataURL(file);
    }

    // Save configurations back to MongoDB
    async function saveConfiguration() {
      if (!currentConfigData) return;
      showLoader(true);

      const bannerText = document.getElementById('bannerText').value;
      const upcomingClass = {
        title: document.getElementById('upcomingTitle').value,
        subject: document.getElementById('upcomingSubject').value,
        time: document.getElementById('upcomingTime').value,
        teacherName: document.getElementById('upcomingTeacherName').value,
        teacherAvatar: document.getElementById('upcomingTeacherAvatar').value
      };

      const boosterCourse = {
        headerTitle: document.getElementById('boosterHeaderTitle').value,
        headerSubtitle: document.getElementById('boosterHeaderSubtitle').value,
        cardTitle: document.getElementById('boosterCardTitle').value,
        title: document.getElementById('boosterTitle').value,
        subjects: currentConfigData.boosterCourse.subjects || ['Maths', 'Science', 'English'],
        price: Number(document.getElementById('boosterPrice').value) || 149,
        originalPrice: Number(document.getElementById('boosterOriginalPrice').value) || 999
      };

      const masterProgram = {
        headerTitle: document.getElementById('masterHeaderTitle').value,
        headerSubtitle: document.getElementById('masterHeaderSubtitle').value,
        title: document.getElementById('masterTitle').value,
        bullets: [
          document.getElementById('masterBullet1').value,
          document.getElementById('masterBullet2').value,
          document.getElementById('masterBullet3').value
        ],
        price: Number(document.getElementById('masterPrice').value) || 31999
      };

      const teachers = [];
      const groups = document.querySelectorAll('.teacher-item-group');
      groups.forEach((g, idx) => {
        teachers.push({
          name: g.querySelector('.t-name').value,
          role: g.querySelector('.t-role').value,
          avatar: document.getElementById(`t-url-${idx}`).value
        });
      });

      const bodyData = {
        bannerText,
        upcomingClass,
        teachers,
        boosterCourse,
        masterProgram
      };

      try {
        const response = await fetch(`/api/homepage-configs/${currentClass}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(bodyData)
        });

        const result = await response.json();
        if (result.success) {
          showToast(`Configurations for ${currentClass} saved! ✨`);
        } else {
          alert('Failed to save settings: ' + (result.error || 'Unknown error'));
        }
      } catch (err) {
        console.error('Error saving config:', err);
        alert('Failed to connect to API server.');
      } finally {
        showLoader(false);
      }
    }

    function showLoader(show) {
      const loader = document.getElementById('loadingOverlay');
      if (show) loader.classList.add('active');
      else loader.classList.remove('active');
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      document.getElementById('toastMessage').textContent = message;
      toast.classList.add('active');
      setTimeout(() => {
        toast.classList.remove('active');
      }, 3000);
    }
  </script>
</body>
